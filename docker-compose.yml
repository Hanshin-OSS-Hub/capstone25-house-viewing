services:
  app:
    build: .
    container_name: house-viewing-server
    depends_on:
      - db
      - redis
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/house_viewing
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - PYTHON_API_URL=http://host.docker.internal:8000
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: mysql-house-viewing
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: house_viewing
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: house-viewing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
