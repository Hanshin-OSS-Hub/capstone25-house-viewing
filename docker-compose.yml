# Android(Kotlin) 클라이언트 이미지는 프로필 android 로만 빌드/실행 (기본 up 에는 포함 안 됨)
#   docker compose --profile android build android
#   docker compose --profile android run --rm android

services:
  app:
    build: ./backend
    restart: unless-stopped
    image: house-viewing-app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/house_viewing
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=1234
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - KAKAO_REST_API_KEY=${KAKAO_REST_API_KEY}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY}
      - PYTHON_API_URL=http://host.docker.internal:8000
    networks:
      - app-network

  android:
    platform: linux/amd64
    build:
      context: ./app
      dockerfile: Dockerfile
      args:
        KOTLIN_VERSION: "2.0.21"
        AGP_VERSION: "8.12.3"
        COMPILE_SDK: "36"
    image: android:local
    profiles:
      - android

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: house_viewing
    ports:
      - "3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
  redis-data:
